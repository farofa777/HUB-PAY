<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dashboard - Live Sync</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas Essenciais via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/papaparse/papaparse.min.js"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #050505; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
        }
        .nexus-gradient { 
            background: radial-gradient(circle at top right, #1a1a1a, #050505); 
            min-height: 100vh;
        }
        .glass-panel { 
            background: rgba(15, 15, 15, 0.7); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .glow-orange { 
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // CONFIGURAÇÃO DA PLANILHA
        // ==========================================
        // 1. Abra sua planilha
        // 2. O ID é a parte entre '/d/' e '/edit' na URL
        const SHEET_ID = "COLOQUE_AQUI_O_ID_DA_SUA_PLANILHA"; 
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        const App = () => {
            const [vendedores, setVendedores] = useState([
                { id: '1', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100' },
                { id: '2', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100' },
                { id: '3', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100' },
            ]);
            const [meta, setMeta] = useState(1000000);
            const [lastUpdate, setLastUpdate] = useState('--:--:--');
            const [error, setError] = useState(null);

            const totalRevenue = useMemo(() => vendedores.reduce((acc, v) => acc + v.faturamento, 0), [vendedores]);
            const porcentagem = useMemo(() => Math.min((totalRevenue / meta) * 100, 100), [totalRevenue, meta]);

            const parseMoney = (val) => {
                if (!val) return 0;
                const clean = String(val).replace(/[^\d]/g, "");
                return (parseFloat(clean) / 100) || 0;
            };

            const fetchData = () => {
                if (SHEET_ID === "COLOQUE_AQUI_O_ID_DA_SUA_PLANILHA") return;

                Papa.parse(CSV_URL, {
                    download: true,
                    header: false,
                    complete: (results) => {
                        const rows = results.data;
                        if (rows && rows.length >= 2) {
                            const namesRow = rows[0]; 
                            const dataRow = rows[rows.length - 1]; 

                            setMeta(parseMoney(dataRow[2]) || 1000000);
                            
                            setVendedores([
                                { ...vendedores[0], name: namesRow[5] || 'Vendedor 1', faturamento: parseMoney(dataRow[5]) },
                                { ...vendedores[1], name: namesRow[6] || 'Vendedor 2', faturamento: parseMoney(dataRow[6]) },
                                { ...vendedores[2], name: namesRow[7] || 'Vendedor 3', faturamento: parseMoney(dataRow[7]) },
                            ]);
                            
                            setLastUpdate(new Date().toLocaleTimeString('pt-BR'));
                            setError(null);
                        }
                    },
                    error: (err) => {
                        setError("Erro ao conectar. Verifique se a planilha está 'Publicada na Web'.");
                    }
                });
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 15000); 
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="nexus-gradient p-6 md:p-12">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-4">
                        <div>
                            <h1 className="text-4xl md:text-6xl font-black tracking-tighter text-white uppercase italic">Nexus Dashboard</h1>
                            <div className="flex items-center gap-2 mt-2">
                                <div className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                                <span className="text-[10px] text-gray-500 uppercase font-black tracking-[0.2em]">
                                    Live Sync Ativo • {lastUpdate}
                                </span>
                            </div>
                        </div>
                        {error && <div className="text-red-500 text-[10px] font-black uppercase bg-red-500/10 px-4 py-2 rounded border border-red-500/20">{error}</div>}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-10">
                        {/* Métricas Principais */}
                        <div className="md:col-span-4 space-y-8">
                            <div className="glass-panel p-10 rounded-xl glow-orange">
                                <p className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2">Faturamento Atual</p>
                                <h2 className="text-5xl md:text-6xl font-black text-white tracking-tighter">
                                    R$ {totalRevenue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </h2>
                                
                                <div className="mt-12">
                                    <div className="flex justify-between text-[11px] font-black mb-3">
                                        <span className="text-gray-500 uppercase tracking-widest">Progresso da Meta</span>
                                        <span className="text-orange-500 text-lg">{porcentagem.toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full h-3 bg-white/5 rounded-full overflow-hidden">
                                        <div 
                                            style={{ width: `${porcentagem}%`, transition: 'width 2s ease' }}
                                            className="h-full bg-orange-500"
                                        />
                                    </div>
                                    <div className="flex justify-between mt-4">
                                        <p className="text-[11px] text-gray-500 font-bold uppercase">Meta: R$ {meta.toLocaleString('pt-BR')}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="glass-panel p-6 rounded-xl border-l-8 border-orange-500 flex justify-between items-center">
                                <div>
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Sincronização</p>
                                    <h3 className="text-2xl font-black text-white uppercase italic tracking-tighter">Google Sheets</h3>
                                </div>
                                <div className="w-12 h-12 bg-orange-500 rounded-lg flex items-center justify-center">
                                    <div className="w-6 h-6 border-4 border-black/20 border-t-black rounded-full animate-spin"></div>
                                </div>
                            </div>
                        </div>

                        {/* Ranking */}
                        <div className="md:col-span-8">
                            <h3 className="text-[11px] font-black text-white uppercase tracking-[0.5em] mb-8 border-b border-white/10 pb-4">Time de Performance</h3>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                {vendedores.map((v, i) => (
                                    <div key={i} className="glass-panel p-8 rounded-xl relative group transition-all hover:-translate-y-2 hover:border-orange-500/40">
                                        <div className="absolute top-2 right-4 text-7xl font-black text-white/5 italic">#{i+1}</div>
                                        
                                        <div className="relative z-10 flex flex-col items-center">
                                            <img src={v.avatar} className="w-24 h-24 rounded-full border-4 border-white/5 object-cover mb-6 shadow-2xl" />
                                            <h4 className="text-2xl font-black text-white uppercase italic text-center mb-1 w-full truncate">
                                                {v.name}
                                            </h4>
                                            <div className="w-12 h-1 bg-orange-500/30 my-4 rounded-full"></div>
                                            <p className="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-1">Total Faturado</p>
                                            <p className="text-3xl font-black text-orange-500 tracking-tighter">
                                                R$ {v.faturamento.toLocaleString('pt-BR')}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
