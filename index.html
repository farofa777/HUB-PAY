<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Vendas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin: 30px 0;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .top1 {
      border: 2px solid gold;
    }

    .top2 {
      border: 2px solid silver;
    }

    .top3 {
      border: 2px solid #cd7f32;
    }

    .nome {
      font-size: 20px;
      font-weight: bold;
    }

    .valor {
      font-size: 24px;
      margin: 10px 0;
      color: #22c55e;
    }

    .vendas {
      font-size: 14px;
      color: #cbd5f5;
    }

  </style>
</head>

<body>

<h1>🏆 Ranking de Vendas</h1>

<div class="container">

  <div class="card top1">
    <div class="nome" id="top1_nome">-</div>
    <div class="valor" id="top1_valor">R$ 0</div>
    <div class="vendas" id="top1_vendas">0 vendas</div>
  </div>

  <div class="card top2">
    <div class="nome" id="top2_nome">-</div>
    <div class="valor" id="top2_valor">R$ 0</div>
    <div class="vendas" id="top2_vendas">0 vendas</div>
  </div>

  <div class="card top3">
    <div class="nome" id="top3_nome">-</div>
    <div class="valor" id="top3_valor">R$ 0</div>
    <div class="vendas" id="top3_vendas">0 vendas</div>
  </div>

</div>

<script>
async function carregarRanking() {
  try {
    const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSyD2NDbrChcsre94UC2kajiZDolp22snf2GLhmvZ_CxM6E_KOLZETfFYhHAv_UfCChOTvFMYEKcPwJ/pub?gid=0&single=true&output=csv");

    const text = await response.text();

    const linhas = text.split("\n").slice(1);

    const dados = linhas
      .map(linha => {
        const [nome, vendas, valor] = linha.split(",");

        return {
          nome: nome?.trim(),
          vendas: Number(vendas),
          valor: Number(valor)
        };
      })
      .filter(d => d.nome);

    dados.sort((a, b) => b.valor - a.valor);

    atualizarUI(dados);

  } catch (error) {
    console.error("Erro ao carregar dados:", error);
  }
}

function atualizarUI(dados) {
  const atualizar = (pos, data) => {
    document.getElementById(`top${pos}_nome`).innerText = data?.nome || "-";
    document.getElementById(`top${pos}_valor`).innerText = "R$ " + (data?.valor || 0);
    document.getElementById(`top${pos}_vendas`).innerText = (data?.vendas || 0) + " vendas";
  };

  atualizar(1, dados[0]);
  atualizar(2, dados[1]);
  atualizar(3, dados[2]);
}

// primeira carga
carregarRanking();

// atualiza a cada 5 segundos
setInterval(carregarRanking, 5000);
</script>

</body>
</html>
