<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dash - Live Sync</title>
    <!-- Tailwind CSS para o visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas Essenciais (Versões Browser) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/papaparse/papaparse.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; margin: 0; overflow-x: hidden; }
        .nexus-gradient { background: radial-gradient(circle at top right, #1a1a1a, #050505); min-height: 100vh; width: 100%; }
        .glass-panel { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-orange { box-shadow: 0 0 20px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Usamos as globais que as bibliotecas acima injetaram no navegador
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- SUA CONFIGURAÇÃO ---
        const SHEET_ID = "1qTS_qgn9WP4kuhdNMH6xl2Vk1uAFePDx9QWYTZCF6-0";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        const App = () => {
            const [vendedores, setVendedores] = useState([
                { id: '1', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100' },
                { id: '2', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100' },
                { id: '3', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100' },
            ]);
            const [monthlyGoal, setMonthlyGoal] = useState(1000000);
            const [lastUpdate, setLastUpdate] = useState('--:--:--');

            const totalRevenue = useMemo(() => vendedores.reduce((acc, v) => acc + v.faturamento, 0), [vendedores]);
            const progressPercentage = useMemo(() => Math.min((totalRevenue / monthlyGoal) * 100, 100), [totalRevenue, monthlyGoal]);

            const parseMoney = (val) => {
                if (!val) return 0;
                // Limpa R$, pontos e vírgulas para converter em número
                const clean = String(val).replace(/[^\d]/g, "");
                return parseFloat(clean) / 100 || 0;
            };

            const fetchData = async () => {
                try {
                    const response = await fetch(CSV_URL);
                    const text = await response.text();
                    
                    Papa.parse(text, {
                        header: false,
                        skipEmptyLines: true,
                        complete: (results) => {
                            const rows = results.data;
                            if (rows && rows.length >= 2) {
                                const namesRow = rows[0]; 
                                // Pegamos a última linha que tem dados na coluna A (DATA)
                                const dataRows = rows.filter(r => r[0] && r[0].length > 5);
                                const latestData = dataRows[dataRows.length - 1] || rows[rows.length - 1];

                                setMonthlyGoal(parseMoney(latestData[2]) || 1000000);
                                
                                setVendedores(prev => prev.map((v, idx) => {
                                    const colIndex = 5 + idx; // F, G, H
                                    return {
                                        ...v,
                                        name: namesRow[colIndex] || v.name,
                                        faturamento: parseMoney(latestData[colIndex])
                                    };
                                }));
                                setLastUpdate(new Date().toLocaleTimeString('pt-BR'));
                            }
                        }
                    });
                } catch (err) {
                    console.error("Erro ao sincronizar planilha:", err);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 10000); // Atualiza a cada 10 segundos
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="nexus-gradient p-4 md:p-8 flex flex-col">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-4">
                        <div>
                            <h1 className="text-5xl md:text-7xl font-black tracking-tighter text-white uppercase italic">
                                Nexus <span className="text-orange-500">Dash</span>
                            </h1>
                            <div className="flex items-center gap-2 mt-2">
                                <div className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                                <span className="text-[10px] text-gray-500 uppercase font-black tracking-[0.3em]">
                                    Live Sync • Atualizado: {lastUpdate}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-8">
                        {/* Esquerda: Métricas */}
                        <div className="md:col-span-4 space-y-6">
                            <div className="glass-panel p-8 rounded-none border-l-4 border-orange-500 glow-orange">
                                <p className="text-[10px] font-black text-gray-500 uppercase tracking-[0.4em] mb-2">Faturamento Acumulado</p>
                                <h2 className="text-5xl md:text-6xl font-black text-white tracking-tighter">
                                    R$ {totalRevenue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </h2>
                                
                                <div className="mt-12">
                                    <div className="flex justify-between text-[11px] font-black mb-3">
                                        <span className="text-gray-400 tracking-widest uppercase">Progresso da Meta</span>
                                        <span className="text-orange-500">{progressPercentage.toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full h-2 bg-white/5 overflow-hidden">
                                        <motion.div 
                                            initial={{ width: 0 }}
                                            animate={{ width: `${progressPercentage}%` }}
                                            transition={{ duration: 1 }}
                                            className="h-full bg-orange-500 shadow-[0_0_15px_#f97316]"
                                        />
                                    </div>
                                    <p className="text-[10px] text-gray-600 mt-3 font-bold uppercase tracking-widest">
                                        Meta: R$ {monthlyGoal.toLocaleString('pt-BR')}
                                    </p>
                                </div>
                            </div>

                            <div className="glass-panel p-6 rounded-none flex items-center justify-between">
                                <div>
                                    <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest">Status da Operação</p>
                                    <p className="text-orange-500 font-black text-lg">ALTA PERFORMANCE</p>
                                </div>
                                <div className="w-12 h-12 rounded-full bg-orange-500/10 flex items-center justify-center">
                                    <div className="w-3 h-3 bg-orange-500 rounded-full animate-ping"></div>
                                </div>
                            </div>
                        </div>

                        {/* Direita: Ranking */}
                        <div className="md:col-span-8 flex flex-col">
                            <div className="flex items-center gap-4 mb-6">
                                <h3 className="text-xs font-black text-white uppercase tracking-[0.5em]">Ranking de Elite</h3>
                                <div className="flex-1 h-[1px] bg-white/10"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {vendedores.map((v, i) => (
                                    <motion.div 
                                        key={v.id}
                                        layout
                                        className="glass-panel p-8 rounded-none relative overflow-hidden group hover:bg-white/[0.03] transition-colors"
                                    >
                                        <div className="relative z-10">
                                            <span className="text-6xl font-black text-white/[0.03] absolute -top-4 -right-4 italic tracking-tighter">
                                                #{i + 1}
                                            </span>
                                            <img src={v.avatar} className="w-16 h-16 rounded-none border border-white/10 mb-6 grayscale group-hover:grayscale-0 transition-all" />
                                            <h4 className="text-xl font-bold text-white uppercase tracking-tighter mb-1">{v.name}</h4>
                                            <p className="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-4">Volume Faturado</p>
                                            <p className="text-2xl font-black text-white group-hover:text-orange-500 transition-colors">
                                                R$ {v.faturamento.toLocaleString('pt-BR')}
                                            </p>
                                        </div>
                                        <div className="absolute bottom-0 left-0 w-0 h-1 bg-orange-500 group-hover:w-full transition-all duration-500"></div>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
