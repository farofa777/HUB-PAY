<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dashboard - Live Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/papaparse/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; margin: 0; overflow-x: hidden; }
        .nexus-gradient { background: radial-gradient(circle at top right, #1a1a1a, #050505); min-height: 100vh; }
        .glass-panel { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const SHEET_ID = "1qTS_qgn9WP4kuhdNMH6xl2Vk1uAFePDx9QWYTZCF6-0";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        const App = () => {
            const [vendedores, setVendedores] = useState([
                { id: '1', name: 'Top 1', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100' },
                { id: '2', name: 'Top 2', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100' },
                { id: '3', name: 'Top 3', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100' },
            ]);
            const [meta, setMeta] = useState(1000000);
            const [lastUpdate, setLastUpdate] = useState('--:--:--');
            const [error, setError] = useState(null);

            const totalRevenue = useMemo(() => vendedores.reduce((acc, v) => acc + v.faturamento, 0), [vendedores]);
            const porcentagem = useMemo(() => Math.min((totalRevenue / meta) * 100, 100), [totalRevenue, meta]);

            const parseMoney = (val) => {
                if (!val) return 0;
                const clean = String(val).replace(/[^\d]/g, "");
                return (parseFloat(clean) / 100) || 0;
            };

            const fetchData = () => {
                Papa.parse(CSV_URL, {
                    download: true,
                    header: false,
                    complete: (results) => {
                        const rows = results.data;
                        if (rows && rows.length >= 2) {
                            const namesRow = rows[0]; 
                            const dataRow = rows[rows.length - 1]; 
                            setMeta(parseMoney(dataRow[2]) || 1000000);
                            setVendedores([
                                { ...vendedores[0], name: namesRow[5] || 'Top 1', faturamento: parseMoney(dataRow[5]) },
                                { ...vendedores[1], name: namesRow[6] || 'Top 2', faturamento: parseMoney(dataRow[6]) },
                                { ...vendedores[2], name: namesRow[7] || 'Top 3', faturamento: parseMoney(dataRow[7]) },
                            ]);
                            setLastUpdate(new Date().toLocaleTimeString('pt-BR'));
                            setError(null);
                        }
                    },
                    error: () => setError("Erro ao conectar com a planilha.")
                });
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 15000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="nexus-gradient p-4 md:p-8">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 gap-4">
                        <div>
                            <h1 className="text-3xl md:text-5xl font-black tracking-tighter text-white uppercase italic">Nexus Dashboard</h1>
                            <div className="flex items-center gap-2 mt-2">
                                <div className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                                <span className="text-[10px] text-gray-500 uppercase font-black tracking-[0.2em]">Live Sync Ativo • {lastUpdate}</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-8">
                        <div className="md:col-span-4 space-y-6">
                            <div className="glass-panel p-8 rounded-lg shadow-[0_0_15px_rgba(249,115,22,0.1)]">
                                <p className="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">Faturamento Atual</p>
                                <h2 className="text-4xl md:text-5xl font-black text-white tracking-tighter">R$ {totalRevenue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</h2>
                                <div className="mt-10">
                                    <div className="flex justify-between text-[10px] font-black mb-2 tracking-widest text-gray-500">
                                        <span>PROGRESSO MENSAL</span>
                                        <span className="text-orange-500">{porcentagem.toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                                        <div style={{ width: `${porcentagem}%`, transition: 'width 2s ease-in-out' }} className="h-full bg-orange-500" />
                                    </div>
                                    <p className="text-[10px] text-gray-500 mt-3 font-bold uppercase">Meta: R$ {meta.toLocaleString('pt-BR')}</p>
                                </div>
                            </div>
                        </div>

                        <div className="md:col-span-8">
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                {vendedores.map((v, i) => (
                                    <div key={i} className="glass-panel p-6 rounded-lg relative overflow-hidden">
                                        <div className="absolute -top-4 -right-1 text-8xl font-black text-white/5 italic select-none">{i + 1}</div>
                                        <div className="relative z-10 flex flex-col items-center">
                                            <img src={v.avatar} className="w-16 h-16 rounded-full border-2 border-white/5 object-cover mb-4" />
                                            <h4 className="text-lg font-black text-white uppercase italic text-center truncate w-full tracking-tighter">{v.name}</h4>
                                            <p className="text-[10px] text-gray-500 font-black mb-1 uppercase tracking-widest mt-2">Faturamento</p>
                                            <p className="text-xl font-black text-orange-500 tracking-tighter">R$ {v.faturamento.toLocaleString('pt-BR')}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
