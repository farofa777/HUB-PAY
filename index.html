<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dashboard - Live Sync</title>
    <!-- Tailwind CSS para o visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- Bibliotecas Externas -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/papaparse/papaparse.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; margin: 0; }
        .nexus-gradient { background: radial-gradient(circle at top right, #1a1a1a, #050505); min-height: 100vh; }
        .glass-panel { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURAÇÃO DA PLANILHA ---
        // Link da sua planilha formatado para CSV
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1qTS_qgn9WP4kuhdNMH6xl2Vk1uAFePDx9QWYTZCF6-0/export?format=csv&gid=0";

        const App = () => {
            const [vendedores, setVendedores] = useState([
                { id: '1', name: 'Carregando...', faturamento: 0, color: 'border-orange-500' },
                { id: '2', name: 'Carregando...', faturamento: 0, color: 'border-blue-500' },
                { id: '3', name: 'Carregando...', faturamento: 0, color: 'border-emerald-500' },
            ]);
            const [monthlyGoal, setMonthlyGoal] = useState(1000000);
            const [lastUpdate, setLastUpdate] = useState('--:--:--');

            const totalRevenue = useMemo(() => vendedores.reduce((acc, v) => acc + v.faturamento, 0), [vendedores]);
            const progressPercentage = useMemo(() => Math.min((totalRevenue / monthlyGoal) * 100, 100), [totalRevenue, monthlyGoal]);

            const parseMoney = (val) => {
                if (!val) return 0;
                const clean = String(val).replace(/[^\d]/g, "");
                return parseFloat(clean) / 100 || 0;
            };

            const fetchData = async () => {
                try {
                    const response = await fetch(CSV_URL);
                    const text = await response.text();
                    
                    Papa.parse(text, {
                        complete: (results) => {
                            const rows = results.data;
                            if (rows.length >= 3) {
                                const namesRow = rows[0]; 
                                // Pegamos a última linha que tenha conteúdo na coluna A (Data)
                                const validRows = rows.filter(r => r[0] && r[0].length > 2);
                                const dataRow = validRows[validRows.length - 1]; 

                                setMonthlyGoal(parseMoney(dataRow[2]) || 1000000);
                                
                                setVendedores(prev => prev.map((v, idx) => {
                                    const colIndex = 5 + idx; // F, G, H (Sellers na sua planilha)
                                    return {
                                        ...v,
                                        name: namesRow[colIndex] || `Top ${idx + 1}`,
                                        faturamento: parseMoney(dataRow[colIndex])
                                    };
                                }));
                                setLastUpdate(new Date().toLocaleTimeString('pt-BR'));
                            }
                        }
                    });
                } catch (err) {
                    console.error("Erro ao sincronizar planilha:", err);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 10000); // Atualiza a cada 10 segundos
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="nexus-gradient p-8">
                    {/* Header */}
                    <div className="mb-12">
                        <h1 className="text-5xl font-black tracking-tighter text-white">NEXUS DASH</h1>
                        <div className="flex items-center gap-2 mt-2">
                            <div className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                            <span className="text-[10px] text-gray-500 uppercase font-bold tracking-[0.2em]">
                                LIVE SYNC ATIVO • {lastUpdate}
                            </span>
                        </div>
                    </div>

                    <div className="grid grid-cols-12 gap-8">
                        {/* Card Principal */}
                        <div className="col-span-12 lg:col-span-12 xl:col-span-5 space-y-6">
                            <div className="glass-panel p-8 rounded-xl border-l-4 border-orange-500">
                                <p className="text-xs font-black text-gray-500 uppercase tracking-widest mb-2">Faturamento Atual</p>
                                <h2 className="text-6xl font-black text-white tracking-tighter mb-8">
                                    R$ {totalRevenue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </h2>
                                
                                <div className="space-y-4">
                                    <div className="flex justify-between items-end">
                                        <div className="text-[10px] font-bold text-gray-500 uppercase">Progresso da Meta</div>
                                        <div className="text-2xl font-black text-orange-500">{progressPercentage.toFixed(1)}%</div>
                                    </div>
                                    <div className="w-full h-3 bg-white/5 rounded-full overflow-hidden">
                                        <div 
                                            className="h-full bg-orange-500 shadow-[0_0_15px_rgba(249,115,22,0.5)] progress-bar"
                                            style={{ width: `${progressPercentage}%` }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] font-bold text-gray-600">
                                        <span>R$ 0,00</span>
                                        <span>META: R$ {monthlyGoal.toLocaleString('pt-BR')}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Ranking Vendedores */}
                        <div className="col-span-12 xl:col-span-7">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {vendedores.map((v, i) => (
                                    <div key={v.id} className={`glass-panel p-6 rounded-xl border-b-2 ${v.color} transition-all hover:translate-y-[-4px]`}>
                                        <div className="text-4xl font-black text-white/5 mb-4 italic">#0{i+1}</div>
                                        <h3 className="text-xl font-bold text-white truncate">{v.name}</h3>
                                        <p className="text-[10px] text-gray-500 font-bold mt-1 uppercase tracking-tighter">Total Vendido</p>
                                        <p className="text-2xl font-black text-white mt-2">
                                            R$ {v.faturamento.toLocaleString('pt-BR')}
                                        </p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
