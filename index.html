<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dash - Live Sync</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Scripts Necessários -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/papaparse/papaparse.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; margin: 0; overflow-x: hidden; }
        .nexus-gradient { background: radial-gradient(circle at top right, #1a1a1a, #050505); min-height: 100vh; width: 100vw; }
        .glow-orange { filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.4)); }
        .glass-panel { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-slow { animation: pulse-slow 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // --- CONFIGURAÇÃO DA SUA PLANILHA ---
        const SHEET_ID = "1qTS_qgn9WP4kuhdNMH6xl2Vk1uAFePDx9QWYTZCF6-0";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        const App = () => {
            const [vendedores, setVendedores] = useState([
                { id: '1', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150' },
                { id: '2', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150' },
                { id: '3', name: 'Carregando...', faturamento: 0, avatar: 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=150' },
            ]);
            const [monthlyGoal, setMonthlyGoal] = useState(1000000);
            const [lastUpdate, setLastUpdate] = useState('--:--:--');

            const totalRevenue = useMemo(() => vendedores.reduce((acc, v) => acc + v.faturamento, 0), [vendedores]);
            const progressPercentage = useMemo(() => Math.min((totalRevenue / monthlyGoal) * 100, 100), [totalRevenue, monthlyGoal]);

            const parseMoney = (val) => {
                if (!val) return 0;
                const clean = String(val).replace(/[^\d]/g, "");
                return parseFloat(clean) / 100 || 0;
            };

            const fetchData = async () => {
                try {
                    const response = await fetch(CSV_URL);
                    const text = await response.text();
                    Papa.parse(text, {
                        complete: (results) => {
                            const rows = results.data;
                            if (rows.length >= 3) {
                                const namesRow = rows[0];
                                const dataRow = rows[rows.length - 1]; // Pega a última linha com dados

                                setMonthlyGoal(parseMoney(dataRow[2]) || 1000000);
                                
                                setVendedores(prev => prev.map((v, idx) => {
                                    const colIndex = 5 + idx; // Colunas F, G, H baseadas no seu print
                                    return {
                                        ...v,
                                        name: namesRow[colIndex] || `Top ${idx + 1}`,
                                        faturamento: parseMoney(dataRow[colIndex]),
                                    };
                                }));
                                setLastUpdate(new Date().toLocaleTimeString('pt-BR'));
                            }
                        }
                    });
                } catch (err) {
                    console.error("Erro ao sincronizar planilha:", err);
                }
            };

            useEffect(() => {
                fetchData();
                const interval = setInterval(fetchData, 10000); // Atualiza a cada 10 seg
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="nexus-gradient p-8 flex flex-col">
                    {/* Top Bar */}
                    <div className="flex justify-between items-end mb-12 border-b border-white/5 pb-6">
                        <div>
                            <h1 className="text-5xl font-black tracking-tighter text-white uppercase italic">Nexus Dashboard</h1>
                            <div className="flex items-center gap-3 mt-2">
                                <div className="w-2 h-2 rounded-full bg-orange-500 animate-pulse"></div>
                                <span className="text-[10px] text-gray-400 uppercase font-black tracking-[0.3em]">
                                    Live Sync Ativo • Última atualização: {lastUpdate}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-12 gap-8 flex-1">
                        {/* Lado Esquerdo: Main Stats */}
                        <div className="col-span-12 lg:col-span-4 space-y-8">
                            <div className="glass-panel p-8 rounded-sm relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10">
                                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                </div>
                                <p className="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-2">Receita Total Acumulada</p>
                                <h2 className="text-6xl font-black text-white tracking-tighter">
                                    <span className="text-orange-500 text-3xl mr-2">R$</span>
                                    {totalRevenue.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </h2>
                                
                                <div className="mt-12 bg-white/5 p-4 rounded-sm">
                                    <div className="flex justify-between text-[11px] font-black mb-3">
                                        <span className="text-gray-400 tracking-widest text-orange-500">PROGRAMA DE METAS</span>
                                        <span className="text-white">{progressPercentage.toFixed(1)}%</span>
                                    </div>
                                    <div className="w-full h-2 bg-black/40 rounded-full overflow-hidden">
                                        <motion.div 
                                            initial={{ width: 0 }}
                                            animate={{ width: `${progressPercentage}%` }}
                                            transition={{ duration: 1.5, ease: "easeOut" }}
                                            className="h-full bg-orange-500 glow-orange"
                                        />
                                    </div>
                                    <p className="text-[9px] text-gray-500 mt-3 font-bold text-center italic">Calculado com base na meta mensal de R$ {monthlyGoal.toLocaleString('pt-BR')}</p>
                                </div>
                            </div>
                        </div>

                        {/* Lado Direito: Leaderboard */}
                        <div className="col-span-12 lg:col-span-8 flex flex-col">
                            <div className="flex items-center gap-4 mb-6">
                                <div className="h-[1px] flex-1 bg-white/10"></div>
                                <h3 className="text-xs font-black text-white uppercase tracking-[0.5em] italic">Equipe Performance</h3>
                                <div className="h-[1px] flex-1 bg-white/10"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {vendedores.map((v, i) => (
                                    <motion.div 
                                        key={v.id}
                                        layout
                                        className="glass-panel p-8 rounded-sm relative group hover:border-orange-500/30 transition-all duration-500"
                                    >
                                        <div className="relative z-10 flex flex-col items-center text-center">
                                            <div className="text-7xl font-black text-white/5 absolute -top-4 -left-4 tracking-tighter italic">{i + 1}</div>
                                            <div className="w-20 h-20 rounded-full border-2 border-white/10 p-1 mb-6 group-hover:border-orange-500 transition-colors duration-500">
                                                <img src={v.avatar} className="w-full h-full rounded-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />
                                            </div>
                                            <h4 className="text-xl font-black text-white uppercase tracking-tight mb-1">{v.name}</h4>
                                            <div className="h-1 w-8 bg-orange-500 mb-4"></div>
                                            <p className="text-[10px] text-gray-500 font-black tracking-widest mb-2 uppercase">Faturamento Individual</p>
                                            <p className="text-2xl font-black text-white tracking-tighter">R$ {v.faturamento.toLocaleString('pt-BR')}</p>
                                        </div>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
